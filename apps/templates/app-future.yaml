# =============================================================================
# future — Argo CD Application for the placeholder chart. Sync wave 1 (after alb).
# Harmless while the future chart is empty; populate the chart to make it deploy.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: future
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: {{ .Values.project }}
  source:
    repoURL: {{ .Values.repo.url | quote }}
    targetRevision: {{ .Values.repo.targetRevision }}
    path: future
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: future
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
