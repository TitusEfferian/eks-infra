# =============================================================================
# Values for the `apps` chart (the app-of-apps payload).
#
# In normal operation these are NOT edited here: the 'infra-root' Application in
# the argocd chart renders this chart from git and injects repo.url +
# repo.targetRevision via helm parameters. The defaults below are only used if you
# render this chart directly (e.g. `helm template apps .`).
# =============================================================================

# Git remote + revision this repo lives at. Injected by the root app at sync time.
repo:
  url: ""
  targetRevision: main

# Argo CD AppProject the child Applications belong to. Must match the AppProject
# created by the argocd chart (argocd/values.yaml `project`). Default: infra.
project: infra

# Self-management: render the `argocd` child Application (Argo CD managing the very
# release that bootstrapped it). Advanced / opt-in — see apps/templates/app-argocd.yaml
# and argocd/README.md. Toggle this in git, then let the root app sync it.
selfManage: false

# Egress verification: render the `egress-test` child Application (netshoot pinned
# to one subnet to confirm a client's static NAT egress IP). It is a deliberate
# TEST that provisions a real Auto Mode node. See egress-test/README.md.
#
# ORDERING (important): the chart's NodeClass selects the dedicated subnet by the
# tag egress-client=<client>. That subnet + its NAT + Elastic IP are created by the
# EKS Terraform stack (my_terraform_collections/EKS, module.client_egress). APPLY
# THAT TERRAFORM FIRST. If this is enabled before the subnet exists, the NodeClass
# matches zero subnets and the netshoot pod simply stays Pending (harmless, but the
# test can't pass until the subnet is there).
egressTest: true

# Second egress client (destination-b): renders a SECOND egress-test release with
# parameter overrides (client / namespace / subnet tag), into its own namespace.
# Default false — enable only AFTER destination-b's Terraform (subnet/NAT/EIP) is
# applied (which needs the EIP quota raised). Same ordering caveat as egressTest.
egressTestDestinationB: false
