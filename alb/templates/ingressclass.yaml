# =============================================================================
# Dedicated, NON-default 'alb' IngressClass for the self-managed controller.
#
# We own this (rather than letting the subchart create it) so that:
#   - it is explicitly NOT the cluster default (no
#     ingressclass.kubernetes.io/is-default-class annotation), keeping it
#     isolated from EKS Auto Mode's built-in eks.amazonaws.com/alb class; and
#   - its spec.controller is ingress.k8s.aws/alb (this controller), so only
#     Ingresses with `ingressClassName: alb` are reconciled here.
#
# The IngressClassParams CRD (elbv2.k8s.aws) is installed by the
# aws-load-balancer-controller subchart's crds/ on `helm install`, so this
# renders against an existing CRD.
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: alb
spec:
  controller: ingress.k8s.aws/alb
  parameters:
    apiGroup: elbv2.k8s.aws
    kind: IngressClassParams
    name: alb
    scope: Cluster
---
# Cluster-scoped defaults applied to every Ingress on the 'alb' class. Per-Ingress
# alb.ingress.kubernetes.io/* annotations (e.g. on the Argo CD server Ingress)
# still apply on top of these.
apiVersion: elbv2.k8s.aws/v1beta1
kind: IngressClassParams
metadata:
  name: alb
spec:
  scheme: internet-facing
  ipAddressType: ipv4
