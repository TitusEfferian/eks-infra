# =============================================================================
# AppProject that scopes the GitOps apps (root app + its children). Created in the
# Argo CD install namespace (.Release.Namespace, normally "argocd") so the Argo CD
# controller — which by default only watches its own namespace — picks it up.
# Installed regardless of repo.url so the project exists before the root app.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: {{ .Values.project }}
  namespace: {{ .Release.Namespace }}
  # NOTE: deliberately NO resources-finalizer.argocd.argoproj.io here. That
  # finalizer is for Applications (it triggers cascade-delete of managed
  # resources, and the app controller removes it afterwards). Nothing removes it
  # from an AppProject, so `kubectl delete appproject` would hang. AppProjects are
  # plain config and are safe to delete without a finalizer. (The child
  # Applications in apps/ DO keep the finalizer — that is the correct use.)
spec:
  description: Core infra managed by the eks-infra app-of-apps.
  # Permitted source repos. Pinned to this repo once repo.url is set; '*' until
  # then so the project is valid pre-bootstrap.
  sourceRepos:
    {{- if .Values.repo.url }}
    - {{ .Values.repo.url | quote }}
    {{- else }}
    - '*'
    {{- end }}
  # In-cluster destinations the apps may deploy to (any namespace).
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  # Allow cluster-scoped resources (IngressClass, the LBC CRDs, etc.)...
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  # ...and all namespaced resources, for this playground project.
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
