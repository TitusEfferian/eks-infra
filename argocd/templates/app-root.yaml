{{- if .Values.repo.url }}
# =============================================================================
# infra-root — the app-of-apps ROOT Application.
#
# GUARDED by repo.url: only rendered once you set repo.url (your pushed remote)
# and `helm upgrade`. It syncs the `apps` chart from git (path: apps), injecting
# repo.url + repo.targetRevision as helm parameters. Because the alb/future
# children are then synced by THIS parent Application, their sync-wave annotations
# are honoured (alb wave 0 → future wave 1) — which would NOT happen if the
# children were applied directly by Helm.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-root
  namespace: {{ .Release.Namespace }}
spec:
  project: {{ .Values.project }}
  source:
    repoURL: {{ .Values.repo.url | quote }}
    targetRevision: {{ .Values.repo.targetRevision }}
    path: apps
    helm:
      parameters:
        - name: repo.url
          value: {{ .Values.repo.url | quote }}
        - name: repo.targetRevision
          value: {{ .Values.repo.targetRevision | quote }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Release.Namespace }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
