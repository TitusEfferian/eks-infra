# =============================================================================
# netshoot Deployment — the actual egress probe. Pinned onto this client's nodes
# with BOTH a nodeSelector (client=<name>) AND a matching toleration for the
# NodePool's taint. Kept alive with `tail -f /dev/null` (a bare netshoot pod's
# shell would exit and CrashLoopBackOff; `sleep infinity` is avoided because
# netshoot is Alpine/busybox and its `sleep` may reject the `infinity` argument).
#
# Test:  kubectl -n <ns> exec deploy/netshoot -- curl -s https://checkip.amazonaws.com
#        -> should print the client's dedicated NAT Elastic IP.
# No special capabilities are needed for outbound curl, so it runs non-root, with a
# read-only root filesystem, all Linux capabilities dropped, and a writable /tmp.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netshoot
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: netshoot
    app.kubernetes.io/part-of: egress-test
    client: {{ .Values.client }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: netshoot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netshoot
        app.kubernetes.io/part-of: egress-test
        client: {{ .Values.client }}
    spec:
      # Pin to this client's nodes: nodeSelector keeps the pod off the untainted
      # built-in general-purpose NodePool; the toleration lets it onto ours.
      nodeSelector:
        client: {{ .Values.client }}
      tolerations:
        - key: client
          operator: Equal
          value: {{ .Values.client }}
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534   # nobody (exists in the netshoot Alpine base)
        runAsGroup: 65534
        fsGroup: 65534     # so the non-root user can write the /tmp emptyDir
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netshoot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Keep the pod running so we can exec in. `tail -f /dev/null` (NOT
          # `sleep infinity`) — busybox `sleep` may reject the `infinity` arg.
          command: ["tail", "-f", "/dev/null"]
          env:
            # Writable HOME for shells/tools, since the root fs is read-only.
            - name: HOME
              value: /tmp
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      # tail handles SIGTERM promptly; no need for a long grace period.
      terminationGracePeriodSeconds: 5
