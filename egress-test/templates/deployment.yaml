# =============================================================================
# netshoot Deployment — the actual egress probe. Pinned onto this client's nodes
# with BOTH a nodeSelector (client=<name>) AND a matching toleration for the
# NodePool's taint. Kept alive with `sleep infinity` (a bare netshoot pod's shell
# would exit and CrashLoopBackOff).
#
# Test:  kubectl -n <ns> exec deploy/netshoot -- curl -s ifconfig.me
#        -> should print the client's dedicated NAT Elastic IP.
# No special capabilities are needed for outbound curl, so it runs non-root with
# all Linux capabilities dropped.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netshoot
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: netshoot
    app.kubernetes.io/part-of: egress-test
    client: {{ .Values.client }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: netshoot
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netshoot
        app.kubernetes.io/part-of: egress-test
        client: {{ .Values.client }}
    spec:
      # Pin to this client's nodes: nodeSelector keeps the pod off the untainted
      # built-in general-purpose NodePool; the toleration lets it onto ours.
      nodeSelector:
        client: {{ .Values.client }}
      tolerations:
        - key: client
          operator: Equal
          value: {{ .Values.client }}
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netshoot
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Keep the pod running so we can exec in; a bare shell would exit.
          command: ["sleep", "infinity"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      # sleep handles SIGTERM promptly; no need for a long grace period.
      terminationGracePeriodSeconds: 5
